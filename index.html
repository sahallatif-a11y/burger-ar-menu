<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Burger AR Menu</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ar-instructions {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px 25px;
        border-radius: 30px;
        font-family: sans-serif;
        text-align: center;
        z-index: 1000;
        width: 80%;
      }
      #start-btn {
        background: #ff6600;
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <!-- UI Overlay -->
    <div id="ar-instructions">
      <div id="instruction-text">Scanning Successful!</div>
      <div style="font-size: 14px; margin-top: 5px;">
        Point your camera at the <b>Hiro Marker</b> on the menu to see the 3D Food.
      </div>
      <button id="start-btn" onclick="this.parentElement.style.display='none'">Got it!</button>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
    >
      <!-- Hiro Marker: Sab se stable tracking -->
      <a-marker preset="hiro">
        <!-- 3D Content Container -->
        <a-entity rotation="-90 0 0" position="0 0 0">
          
          <!-- Background Plate -->
          <a-plane width="2" height="3" color="#111" material="opacity: 0.9; transparent: true"></a-plane>

          <!-- Menu Header -->
          <a-text value="BURGER MENU" align="center" position="0 1.2 0.1" width="5" color="#ff6600"></a-text>

          <!-- Burger 1 Item -->
          <a-entity position="0 0.4 0.1">
            <a-text value="BURGER - $7.49" align="center" width="3" color="#fff"></a-text>
            <!-- Simple 3D Burger Model -->
            <a-sphere radius="0.3" position="0 -0.3 0.2" scale="1 0.6 1" color="#d2b48c"></a-sphere>
            <a-cylinder radius="0.32" height="0.05" position="0 -0.35 0.2" color="#8b4513"></a-cylinder>
            <a-sphere radius="0.3" position="0 -0.4 0.2" scale="1 0.3 1" color="#d2b48c"></a-sphere>
          </a-entity>

          <!-- Burger 2 Item -->
          <a-entity position="0 -0.6 0.1">
            <a-text value="BIG BURGER - $8.49" align="center" width="3" color="#fff"></a-text>
            <!-- Simple 3D Big Burger -->
            <a-sphere radius="0.3" position="0 -0.3 0.2" scale="1 0.6 1" color="#d2b48c"></a-sphere>
            <a-cylinder radius="0.32" height="0.1" position="0 -0.35 0.2" color="#8b4513"></a-cylinder>
            <a-cylinder radius="0.32" height="0.05" position="0 -0.4 0.2" color="#00ff00"></a-cylinder>
            <a-sphere radius="0.3" position="0 -0.45 0.2" scale="1 0.3 1" color="#d2b48c"></a-sphere>
          </a-entity>

          <!-- Footer Text -->
          <a-text value="Tap on items to order" align="center" position="0 -1.3 0.1" width="2" color="#aaa"></a-text>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Browser permission handle karne ke liye check
      window.addEventListener('camera-error', function(error) {
        document.getElementById('instruction-text').innerHTML = "Camera Error: Please enable camera in browser settings.";
        document.getElementById('instruction-text').style.color = "red";
      });
    </script>
  </body>
</html>
