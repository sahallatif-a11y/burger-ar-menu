<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Interactive AR Food Menu</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
      .menu-overlay {
        position: absolute; bottom: 20px; left: 0; right: 0;
        text-align: center; z-index: 10; font-family: sans-serif;
        color: white; background: rgba(0,0,0,0.6); padding: 10px;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <div class="menu-overlay">
      <h2>Scan successful! Floating AR Menu</h2>
      <p>Move your phone to see 3D Burgers</p>
    </div>
    <a-scene embedded vr-mode-ui="enabled: false">
      <!-- 3D Burger 1 -->
      <a-entity position="-1 1.5 -3" rotation="0 45 0">
        <a-sphere radius="0.4" color="#d2b48c" scale="1 0.5 1"></a-sphere>
        <a-cylinder radius="0.45" height="0.1" color="#8b4513" position="0 -0.1 0"></a-cylinder>
        <a-text value="Burger\n$7.49" align="center" position="0 0.6 0" width="4"></a-text>
      </a-entity>
      <!-- 3D Burger 2 (Big) -->
      <a-entity position="1 1.5 -3" rotation="0 -45 0">
        <a-sphere radius="0.4" color="#d2b48c" scale="1 0.5 1"></a-sphere>
        <a-cylinder radius="0.45" height="0.2" color="#8b4513" position="0 -0.1 0"></a-cylinder>
        <a-text value="Big Burger\n$8.49" align="center" position="0 0.6 0" width="4"></a-text>
      </a-entity>
      <a-sky color="#111"></a-sky>
      <a-entity camera position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
